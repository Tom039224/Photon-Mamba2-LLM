name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      # pm-cuda's dev-dependencies pull in pm-candle with the `cuda` feature,
      # which makes cudarc's build.rs require `nvcc`. GitHub-hosted runners
      # have no CUDA toolkit, so pm-cuda is excluded from the --all-targets
      # runs below and checked separately as a lib-only (no dev-deps) target.
      - name: clippy
        run: cargo clippy --workspace --all-targets --exclude pm-cuda -- -D warnings
      - name: clippy (pm-cuda, lib only)
        run: cargo clippy -p pm-cuda --lib -- -D warnings
      - name: build
        run: cargo build --workspace --all-targets --exclude pm-cuda
      - name: build (pm-cuda, lib only)
        run: cargo build -p pm-cuda --lib
      - name: test
        run: cargo test --workspace --exclude pm-cuda

  pm-core-no-backend-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify pm-core is backend-agnostic
        run: bash scripts/check_pm_core_deps.sh
