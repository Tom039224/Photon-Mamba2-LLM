# Small CUDA smoke: same shape as the 100M production config but with
# seq_len=128 + batch_size=2 + n_layers=2 + d_model=256 so each step
# stays under a second on RTX 5070 and the total run finishes in ~1min.
# Verifies the GPU code path end-to-end.

[model]
vocab_size = 1024
d_model = 256
d_state = 64
d_head = 32
n_heads = 8
n_groups = 1
d_conv = 4
block_len = 16
rmsnorm_eps = 1e-5
n_layers_per_level = 2
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 128
batch_size = 2
n_steps = 20
lr = 3e-3
weight_decay = 0.01
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 0xC0FFEE
log_every = 2
save_path = ""

[runtime]
device = "cuda"
