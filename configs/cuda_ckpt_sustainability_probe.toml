# B4.4 sustainability probe (2026-06-30).
#
# Goal: confirm pm_cuda::CudaBackend + activation_checkpointing can
# sustain training for hundreds of steps without OOM or NaN, beyond
# the 31-step datapoint collected during B4.4c.
#
# Same envelope as lr_sweep_1e-4 (102 M PhotonMamba, batch=1, seq=512)
# so per-step numerics can be compared directly with the existing
# CandleBackend trajectory if needed. No checkpoint save — this is a
# pure runtime/memory test, not a training pursuit.
#
# Expected wall: ~20 s/step × 300 step = 100 min, capped at 120 min.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 300
max_wall_time_seconds = 7200  # 2 h hard cap
lr = 1e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = ""
save_every = 0
log_every = 25
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
fresh_batch_per_step = false
activation_checkpointing = true

[runtime]
device = "cuda"
