# 2-hour real-text training run on TinyStories (GPT-4 validation split).
#
# Same 102.7 M model as the F.9 / 14h smokes, but now the data has
# actual structure for the model to learn. With TinyStories + GPT-2
# BPE and AdamW lr=3e-4, the loss should drop from ~10.8 (uniform)
# toward ~6–7 over ~7000 steps. Faster than the overnight run because
# we no longer feed pure noise.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 100000           # safety net; max_wall_time wins
max_wall_time_seconds = 7200  # 2 h
lr = 3e-4                  # half of the overnight lr — real data has signal, smaller steps stay stable
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = "checkpoints/realtext_tinystories.safetensors"
save_every = 500
log_every = 25
# Real-text path
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256         # GPT-2 EOS / <|endoftext|>
fresh_batch_per_step = false  # ignored when text_data is set

[runtime]
device = "cuda"
