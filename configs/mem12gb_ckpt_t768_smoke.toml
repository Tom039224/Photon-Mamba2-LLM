# Prototype smoke: activation-checkpointed training at T=768 on real text.
#
# Demonstrates the "free 2x" memory lever from the 2026-07-03 A1 probes:
# T=768 B=1 OOMs WITHOUT activation checkpointing but fits at ~9.2 GB WITH it
# (see docs/perf-log.md 2026-07-03). Real TinyStories text (not random) so the
# loss curve reflects actual language modelling.
#
# Run:  target/release/pm train --config configs/mem12gb_ckpt_t768_smoke.toml --backend candle

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 768
batch_size = 1
n_steps = 80
lr = 3e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
log_every = 5
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
activation_checkpointing = true

[runtime]
device = "cuda"
