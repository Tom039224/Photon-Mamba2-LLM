# B4.4d OOM repro config — 5 steps only, no activation checkpointing.
#
# Before fix: OOM at step 1 (cuMemFreeAsync not yet retired when next
# cuMemAllocAsync fires).  After fix: all 5 steps complete cleanly.
# Same model/data/seed/lr as lr_sweep_1e-4_500.toml (102 M PhotonMamba).
#
# External prerequisites (both .gitignore'd — provision separately):
#   data/tinystories_valid.txt   (22 MB GPT-2 BPE text source)
#   tokenizer/gpt2.json          (HuggingFace GPT-2 tokenizer JSON)
# Without these the run errors out with a "no such file" at tokenizer
# load BEFORE the OOM repro path executes.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 5
max_wall_time_seconds = 300  # 5 min safety
lr = 1e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = ""  # no save
save_every = 0
log_every = 1
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
fresh_batch_per_step = false

[runtime]
device = "cuda"
