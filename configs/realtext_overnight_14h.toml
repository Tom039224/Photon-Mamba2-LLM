# 14-hour real-text overnight run for the 102.7 M PhotonMamba on RTX 5070.
#
# B3 "放置体制" config (2026-06-30): same envelope as the validated
# 2 h TinyStories run (`realtext_2h.toml`, loss 11.32 → ~7) but
# stretched to 14 h with conservative checkpointing.
#
# Why these knobs:
# - TinyStories (22 MB → ~5.5 M tokens at GPT-2 BPE). At 1 s/step
#   the run sees ~50 k steps = ~25 M tokens = ~5 epochs over the
#   corpus. Plenty of signal without needing a bigger dataset.
# - `lr = 3e-4`: half of the random-data sweep, matches the 2 h run
#   that converged cleanly.
# - `save_every = 1000` (≈ 17 min): the atomic-rename save is what
#   makes ctrl+C / divergence / power loss recoverable.
# - `max_wall_time_seconds = 50_400` (= 14 h) is the actual stop; the
#   `n_steps` cap is just a safety net.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 100000
max_wall_time_seconds = 50400  # 14 h
lr = 3e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = "checkpoints/realtext_overnight_14h.safetensors"
save_every = 1000
log_every = 100
# Real-text path
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256          # GPT-2 EOS / <|endoftext|>
fresh_batch_per_step = false

[runtime]
device = "cuda"
