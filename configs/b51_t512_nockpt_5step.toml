# Phase B'.3 wave-1 profile probe — T=512, ckpt OFF, 5 steps (2026-07-07).
# Same envelope as b51_t512_nockpt_1step.toml but n_steps=5 so
# PM_CUDA_PROFILE=1 PM_CUDA_PROFILE_SKIP=1 has steady-state steps to
# aggregate (step 0 is dominated by one-time PTX JIT compilation).
#
# Fingerprint at this envelope (docs/perf-log.md 2026-07-04 B'.2):
#   step-0 loss = 11.3170, grad_norm = 5.172 (cuda, no-ckpt)

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 5
max_wall_time_seconds = 1200
lr = 1e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = ""
save_every = 0
log_every = 1
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
fresh_batch_per_step = false

[runtime]
device = "cuda"
