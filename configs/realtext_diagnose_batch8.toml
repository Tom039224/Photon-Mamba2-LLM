# Diagnostic config (2026-06-30): does the 14h loss plateau at ~7.0 lift
# when batch_size goes from 1 → 8?  Everything else matches
# realtext_overnight_14h.toml so the comparison is clean.
#
# Hypothesis: at batch=1, Adam's 2nd-moment estimate is essentially
# random noise, and lr=3e-4 amplifies that into a "random walk" plateau.
# At batch=8 the per-step gradient should be 8× less noisy, which
# (per Adam scaling theory) corresponds to ≈ 2.8× less noisy moment
# estimates — enough to break out of the plateau if that's the cause.
#
# Activation checkpointing on because batch>1 at seq_len=512 needs it
# (F.6 comment in config.rs).  ~30 min wall.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 64
batch_size = 2
n_steps = 100
max_wall_time_seconds = 2700  # 45 min safety
lr = 3e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = "checkpoints/diagnose_batch2_seq64.safetensors"
save_every = 0  # no intermediate saves
log_every = 10
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
fresh_batch_per_step = false
activation_checkpointing = false

[runtime]
device = "cuda"
