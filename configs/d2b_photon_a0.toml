# D.2b comparison run: PHOTON 102M, consistency_alpha = 0.0.
# 1 epoch of data/tinystories_valid.txt (5,532,654 GPT-2 tokens) at
# T=512 B=1 no-ckpt = 10,805 steps. Counterparts: d2b_photon_a0 /
# d2b_photon_a03 / d2b_flat differ ONLY in alpha or model_type.
# See docs/perf-log.md 2026-07-04 D.2a for the baseline throughput.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 10805
lr = 6e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
log_every = 50
save_path = "checkpoints/d2b_photon_a0.safetensors"
save_every = 2000
consistency_alpha = 0.0

[runtime]
device = "cuda"
