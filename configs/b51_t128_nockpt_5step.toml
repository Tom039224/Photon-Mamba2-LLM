# Phase B'.1 auxiliary probe — T=128, ckpt OFF, 5 steps (2026-07-04).
#
# Two purposes:
# (a) a *fair current* Candle reference: post-rms_norm_slow Candle OOMs at
#     T=512 training on this card, so T=128 is the like-for-like point where
#     a correct-backward Candle still fits;
# (b) pm-cuda T-scaling signal: if pm-cuda step time barely drops from
#     T=512 (12.2 s/step) to T=128, per-step cost is launch/fixed-overhead
#     bound rather than bandwidth/compute bound.

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 128
batch_size = 1
n_steps = 5
max_wall_time_seconds = 600
lr = 1e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = ""
save_every = 0
log_every = 1
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
fresh_batch_per_step = false

[runtime]
device = "cuda"
