# Tiny smoke config — verifies the train command end-to-end without
# burning much GPU time. Used in CI and as a sanity check before
# kicking off the real 100M run.

[model]
vocab_size = 256
d_model = 64
d_state = 16
d_head = 16
n_heads = 4
n_groups = 1
d_conv = 4
block_len = 16
rmsnorm_eps = 1e-5
n_layers_per_level = 1
n_levels = 2
chunk_size = 4
init_scale = 0.05

[train]
seq_len = 32
batch_size = 2
n_steps = 10
lr = 5e-3
weight_decay = 0.0
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 0xDEADBEEF
log_every = 1
save_path = ""

[runtime]
device = "cpu"
