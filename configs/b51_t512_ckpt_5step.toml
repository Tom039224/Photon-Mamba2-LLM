# Phase B'.1 speed-profile probe — T=512, ckpt ON, 5 steps (2026-07-04).
#
# Same envelope as cuda_ckpt_sustainability_probe.toml (102 M PhotonMamba,
# batch=1, seq=512, activation_checkpointing=true) but 5 steps / log_every=1
# so per-step wall time is visible. Used for (a) the B'.1 re-baseline and
# (b) the PM_CUDA_PROFILE per-op attribution run.
#
# Fingerprint at this envelope (see perf-log 2026-07-04 correction):
#   step-0 grad_norm — candle 4.585 / cuda no-ckpt 5.162 / cuda ckpt 4.573

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 5
max_wall_time_seconds = 600
lr = 1e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = ""
save_every = 0
log_every = 1
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
fresh_batch_per_step = false
activation_checkpointing = true

[runtime]
device = "cuda"
