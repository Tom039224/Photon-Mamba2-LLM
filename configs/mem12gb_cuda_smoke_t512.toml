# pm-cuda training demonstration (the WORKING low-memory training backend).
#
# After the rms_norm fix (2026-07-03) the Candle backend OOMs at B=1 T=512
# with ckpt — its pure-Ops ssd_scan backward tape blows up (docs/perf-log.md).
# pm-cuda has a FUSED ssd_scan (single autograd node + recompute backward,
# B4.3), so its SSD backward is memory-bounded; B4.4d showed 300 steps stable
# at this shape. This config demonstrates all-parameter training (pm-cuda has a
# real rmsnorm VJP, unlike the pre-fix Candle path) on real text.
#
# Run:  target/release/pm train --config configs/mem12gb_cuda_smoke_t512.toml --backend cuda

[model]
vocab_size = 50257
d_model = 768
d_state = 128
d_head = 64
n_heads = 12
n_groups = 1
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2
chunk_size = 4
init_scale = 0.02

[train]
seq_len = 512
batch_size = 1
n_steps = 12
lr = 3e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
log_every = 2
text_data = "data/tinystories_valid.txt"
tokenizer = "tokenizer/gpt2.json"
doc_sep_id = 50256
activation_checkpointing = true

[runtime]
device = "cuda"
