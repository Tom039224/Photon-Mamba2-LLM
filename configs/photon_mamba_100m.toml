# PHOTON × Mamba2 — 100M-parameter Phase 1 production config.
#
# Sized for RTX 5070 (12 GB VRAM). Used by `pm train --config`. Real
# data plumbing lands with Group E; until then `pm train` drives this
# config with random ids and verifies the loss + memory profile.
#
# Approximate parameter count:
#   TokenEmbedding (tied): 50_257 * 768 ≈ 38.6M
#   3 × 10 Mamba2 blocks  ≈ 3 × 10 × 2.0M  = 60M
#   chunker + converter   ≈ 2 × 4 × d²    ≈ 5M
#   --------------------------------------------------
#   total                                  ≈ 103M

[model]
vocab_size = 50257       # GPT-2 BPE
d_model = 768
d_state = 128
d_head = 64
n_heads = 12             # n_heads * d_head = d_model
n_groups = 1             # MIS pattern; shared B/C across heads
d_conv = 4
block_len = 64
rmsnorm_eps = 1e-5
n_layers_per_level = 10
n_levels = 2             # Phase 1: L=2 (P.2 in deviations)
chunk_size = 4           # C = R = 4 (P.2 in deviations)
init_scale = 0.02

[train]
# Phase-1 F.9 smoke values. The full 1B-token run (F.10) bumps seq_len
# to 2048 and batch_size to 4–8; that requires activation checkpointing
# (F.6, deferred from this session) because the (B, T, T, H) decay
# matrices in ssd_scan_ops_default each weigh ~800 MB at T=2048 and
# 30 of them won't fit in 12 GB without recompute.
seq_len = 512
batch_size = 1
n_steps = 100
lr = 6e-4
beta1 = 0.9
beta2 = 0.95
eps = 1e-8
weight_decay = 0.1
max_grad_norm = 1.0
seed = 42
init_perturb_seed = 12345
save_path = ""
log_every = 5

[runtime]
device = "cuda"
